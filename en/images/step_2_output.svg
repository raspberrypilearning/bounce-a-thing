<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 860" role="img" aria-labelledby="title desc">
  <title id="title">Step 2 output</title>
  <desc id="desc">The Bounce A Spark page with a midnight blue canvas and a spark near the middle.</desc>
  <defs>
    <linearGradient id="page" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="midnightblue"/>
      <stop offset="55%" stop-color="darkslateblue"/>
      <stop offset="100%" stop-color="mediumslateblue"/>
    </linearGradient>
  </defs>

  <rect width="560" height="860" fill="url(#page)"/>
  <text x="18" y="42" fill="#ffffff" font-family="Arial, sans-serif" font-size="24">Bounce A Spark.</text>

  <rect x="18" y="66" width="524" height="524" rx="4" fill="midnightblue"/>
  <text x="280" y="294" text-anchor="middle" font-size="40">✨</text>
</svg>
